services:
  postgres:
    image: postgres:18-alpine
    env_file:
      - .env
    ports:
      - 5432:5999
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:8-alpine
    env_file:
      - .env
    ports:
      - 6379:6999
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

networks:
  default:
    name: sedthee_random_network

volumes:
  postgres_data:
  redis_data: